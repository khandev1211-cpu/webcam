name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew
        continue-on-error: true # In case I haven't added gradlew yet

      - name: Build with Gradle
        run: |
          cd android
          if [ ! -f "gradlew" ]; then
            gradle wrapper
          fi
          ./gradlew assembleDebug

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v3
        with:
          name: phone-webcam-android
          path: android/app/build/outputs/apk/debug/app-debug.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configure CMake
        run: cmake -S windows -B windows/build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build windows/build --config Release

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v3
        with:
          name: phone-webcam-windows
          path: windows/build/Release/PhoneWebcamReceiver.exe

  create-release:
    needs: [build-android, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download Android Artifact
        uses: actions/download-artifact@v3
        with:
          name: phone-webcam-android

      - name: Download Windows Artifact
        uses: actions/download-artifact@v3
        with:
          name: phone-webcam-windows

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app-debug.apk
            PhoneWebcamReceiver.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
